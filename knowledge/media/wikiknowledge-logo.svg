<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="100%">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <!-- Book / Node Structure representing Knowledge & Graph -->
    <path d="M 50 120 L 110 70 L 170 120 L 110 170 Z" fill="url(#grad1)" />
    <path d="M 110 170 L 170 120 L 170 150 L 110 200 Z" fill="url(#grad2)" />
    <path d="M 50 120 L 110 170 L 110 200 L 50 150 Z" fill="#4f46e5" opacity="0.8" />
    
    <!-- Top Graph Nodes -->
    <circle cx="110" cy="70" r="12" fill="#ffffff" stroke="#3b82f6" stroke-width="4" />
    <circle cx="50" cy="120" r="12" fill="#ffffff" stroke="#8b5cf6" stroke-width="4" />
    <circle cx="170" cy="120" r="12" fill="#ffffff" stroke="#a855f7" stroke-width="4" />
    <circle cx="110" cy="170" r="12" fill="#ffffff" stroke="#6366f1" stroke-width="4" />
    <circle cx="110" cy="200" r="10" fill="#ffffff" stroke="#4f46e5" stroke-width="3" />
    
    <!-- Connection Lines -->
    <line x1="110" y1="70" x2="110" y2="170" stroke="#ffffff" stroke-width="3" stroke-dasharray="4,4" />
  </g>

  <!-- Text -->
  <text x="220" y="142" font-family="'Inter', 'Segoe UI', Roboto, sans-serif" font-size="72" font-weight="800" fill="url(#grad1)" letter-spacing="-1">Wiki<tspan fill="#e2e8f0" font-weight="300">Knowledge</tspan></text>
  <text x="225" y="182" font-family="'Inter', 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="500" fill="#94a3b8" letter-spacing="4">AI-FIRST KNOWLEDGE GRAPH</text>
</svg>
